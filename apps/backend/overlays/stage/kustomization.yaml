apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backend
resources:
  - ../../base

images:
  - name: gitops-backend
    newName: docker.io/simonangelfong/gitops-backend
    newTag: app-v0.2.0

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-backend-stage
      env: stage

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 70
