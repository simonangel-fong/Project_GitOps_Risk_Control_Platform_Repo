apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backend
resources:
  - ../../base
images:
  - name: gitops-backend
    newName: docker.io/simonangelfong/gitops-demo-backend
    newTag: v0.3.1
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-backend
      env: dev
patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 4
      - op: replace
        path: /spec/maxReplicas
        value: 6
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 60
  - target:
      kind: Rollout
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "0.3.1"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "green"
      ###########################
      # Scenario 1: happy path
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "false"
      ###########################
      ###########################
      # Scenario 2 (RDS connection failure): PGDB_ENABLE=true + unreachable PGDB_URL.
      # /api/healthz checks DB, so readiness fails → progressDeadlineSeconds (180s) trips → rollout aborts at 25% step.
      # - op: replace
      #  path: /spec/template/spec/containers/0/env/2/value
      #  value: "true"
      ###########################
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "jdbc:postgresql://broken-host.invalid:5432/demo_db"
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: "false"
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "1"
