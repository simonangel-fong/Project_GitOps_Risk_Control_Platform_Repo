apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backend
resources:
  - ../../base
images:
  - name: gitops-demo-backend
    newName: docker.io/simonangelfong/gitops-demo-backend
    newTag: v0.2.2
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-demo-backend-dev
      env: dev
patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-demo-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 80
