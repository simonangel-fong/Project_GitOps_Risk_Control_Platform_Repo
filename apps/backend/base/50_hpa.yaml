apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gitops-backend
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: gitops-backend
  # Thresholds below are base defaults — each overlay patches them.
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
