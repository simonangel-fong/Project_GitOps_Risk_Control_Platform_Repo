apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gitops-frontend
  annotations:
    notifications.argoproj.io/subscribe.on-rollout-completed.slack: "deployments"
    notifications.argoproj.io/subscribe.on-rollout-degraded.slack: "deployments,platform-alerts"
    notifications.argoproj.io/subscribe.on-rollout-paused.slack: "deployments"
    notifications.argoproj.io/subscribe.on-analysis-run-failed.slack: "deployments,platform-alerts"
    notifications.argoproj.io/subscribe.on-analysis-run-error.slack: "platform-alerts"
spec:
  # replicas is intentionally omitted — the HPA owns it.
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-frontend
    spec:
      serviceAccountName: gitops-frontend
      containers:
        - name: gitops-frontend
          image: gitops-risk-control-frontend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
          - name: BACKEND_URL
            value: "http://gitops-backend.backend.svc.cluster.local:8080"
          - name: DNS_RESOLVER
            value: "kube-dns.kube-system.svc.cluster.local"
          - name: NGINX_ENVSUBST_FILTER
            value: "BACKEND_URL|DNS_RESOLVER"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 60s } 
        - setWeight: 50
        - pause: { duration: 60s } 
        - setWeight: 100