apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitops-demo-frontend
  annotations:
    # e-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: eg
      namespace: gateway
      sectionName: http
    - name: eg
      namespace: gateway
      sectionName: https
  hostnames:
    - gitops-dev.arguswatcher.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitops-demo-frontend
          port: 80
