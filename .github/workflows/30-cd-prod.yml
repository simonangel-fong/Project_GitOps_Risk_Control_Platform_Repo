name: 30-cd-prod

on:
  # Fired by Argo Notifications when apps-prod (app-of-apps) reaches Healthy + Synced.
  repository_dispatch:
    types: [argocd-deployed-prod]
  workflow_dispatch:
    inputs:
      revision:
        description: "prod SHA that was deployed (informational)"
        required: false
        type: string

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  announce-release:
    name: announce-release
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      ENVIRONMENT: ${{ github.event.client_payload.environment || 'prod' }}
      REVISION: ${{ github.event.client_payload.revision || inputs.revision || github.sha }}
      ARGOCD_APP_URL: ${{ github.event.client_payload.argocd_app_url || '' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Post release announcement to Slack
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ vars.SLACK_CHANNEL }}"
            text: ":rocket: prod release ${{ env.REVISION }} on ${{ github.repository }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ":rocket: Production release"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repo:*\n`${{ github.repository }}`"
                  - type: mrkdwn
                    text: "*Environment:*\n`${{ env.ENVIRONMENT }}`"
                  - type: mrkdwn
                    text: "*Revision:*\n`${{ env.REVISION }}`"
                  - type: mrkdwn
                    text: "*Status:*\nHealthy + Synced"
              - type: context
                elements:
                  - type: mrkdwn
                    text: "<${{ env.RUN_URL }}|Workflow run> · <${{ env.ARGOCD_APP_URL }}|Argo CD app>"

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    needs: [announce-release]
    if: always()
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ vars.SLACK_CHANNEL }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
