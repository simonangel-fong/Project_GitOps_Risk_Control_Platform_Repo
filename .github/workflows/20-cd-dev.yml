name: 20-cd-dev

on:
  # Fired by Argo Notifications when apps-dev (app-of-apps) reaches Healthy + Synced.
  repository_dispatch:
    types: [argocd-deployed-dev]
  workflow_dispatch:
    inputs:
      revision:
        description: "dev SHA that was deployed (informational)"
        required: false
        type: string

concurrency:
  group: cd-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  open-promotion-pr:
    name: open-promotion-pr (dev → stage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_BRANCH: stage
      HEAD_BRANCH: dev
      REVISION: ${{ github.event.client_payload.revision || inputs.revision || github.sha }}
      ARGOCD_APP_URL: ${{ github.event.client_payload.argocd_app_url || '' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    outputs:
      pr-url: ${{ steps.create-or-skip.outputs.pr-url }}
      result: ${{ steps.create-or-skip.outputs.result }}
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.CONFIG_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.HEAD_BRANCH }}
          fetch-depth: 1

      - name: Create or skip promotion PR
        id: create-or-skip
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # Idempotency: if an open PR already exists for dev → stage, skip.
          existing="$(gh pr list \
            --repo "$REPO" \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json url,number \
            --jq '.[0]')"

          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            url="$(echo "$existing" | jq -r .url)"
            echo "Open promotion PR already exists: $url"
            echo "pr-url=$url" >> "$GITHUB_OUTPUT"
            echo "result=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Diff check: nothing to promote.
          if git diff --quiet "origin/${BASE_BRANCH}..origin/${HEAD_BRANCH}"; then
            echo "No diff between ${HEAD_BRANCH} and ${BASE_BRANCH}; nothing to promote."
            echo "result=no-diff" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          short_rev="${REVISION:0:7}"
          title="promote ${HEAD_BRANCH} → ${BASE_BRANCH} (rev: ${short_rev})"
          body=$(cat <<EOF
          Promotion triggered by Argo CD: \`apps-${HEAD_BRANCH}\` reached Healthy at \`${short_rev}\`.

          - Revision: \`${REVISION}\`
          - Argo CD: ${ARGOCD_APP_URL:-_n/a_}
          - Triggered run: ${RUN_URL}

          Auto-merge enabled. Will merge once required status checks pass.
          EOF
          )

          url="$(gh pr create \
            --repo "$REPO" \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "$title" \
            --body "$body")"

          echo "Opened promotion PR: $url"
          echo "pr-url=$url" >> "$GITHUB_OUTPUT"
          echo "result=created" >> "$GITHUB_OUTPUT"

          # Enable auto-merge (squash). Requires "Allow auto-merge" in repo settings
          # and required status checks on the base branch.
          gh pr merge "$url" --auto --squash

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    needs: [open-promotion-pr]
    if: always()
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ vars.SLACK_CHANNEL }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
