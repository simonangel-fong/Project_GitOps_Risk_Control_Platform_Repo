name: 40-cd-web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/40-cd-web.yml'
  workflow_dispatch:

# Serialize: don't let two pushes race to terraform apply on shared state.
concurrency:
  group: cd-web
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: terraform apply (web)
    runs-on: ubuntu-latest
    environment:
      name: web
      url: https://gitops.arguswatcher.net
    permissions:
      contents: read
      id-token: write # required for AWS OIDC
    env:
      AWS_REGION: ca-central-1
      TF_IN_AUTOMATION: 'true'
      TF_INPUT: '0'
      TF_VAR_cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.cloudflare_zone_id }}
      TF_VAR_aws_acm_cert_arn: ${{ secrets.aws_acm_cert_arn }}
    outputs:
      distribution-id: ${{ steps.tf-outputs.outputs.distribution-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-40-cd-web-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.15.2
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: web/infra
        run: terraform fmt -check -recursive

      - name: terraform init
        working-directory: web/infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="region=${{ vars.TF_BACKEND_REGION }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY }}"

      - name: terraform validate
        working-directory: web/infra
        run: terraform validate

      - name: terraform plan
        working-directory: web/infra
        run: terraform plan -out=tfplan -lock-timeout=5m

      - name: terraform apply
        working-directory: web/infra
        run: terraform apply -auto-approve -lock-timeout=5m tfplan

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: web/infra
        run: |
          dist_id="$(terraform output -raw cloudfront_distribution_id)"
          echo "distribution-id=${dist_id}" >> "$GITHUB_OUTPUT"
          echo "CloudFront distribution: ${dist_id}"

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ steps.tf-outputs.outputs.distribution-id }}
        run: |
          set -euo pipefail
          inv_id="$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)"
          echo "Invalidation created: $inv_id"

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ vars.SLACK_CHANNEL }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
