name: 10-ci-check

on:
  # push to feature-, hotfix-, filter by path
  push:
    branches:
      - 'feature-*'
      - 'hotfix-*'
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'bootstrap/**'
      - '.github/**'
  # pr to dev, stage, prod
  pull_request_target:
    branches: [dev, stage, prod]
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'bootstrap/**'
      - '.github/**'
  # manual
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level defaults; jobs narrow further.
permissions:
  contents: read

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest
    # Block fork PRs: pull_request_target runs with write token + secrets,
    # so we must not check out untrusted PR code from forks.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Lint manifests
        uses: ./.github/actions/lint-check

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'pull_request_target' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      !endsWith(github.actor, '[bot]')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install Checkov
        shell: bash
        env:
          CHECKOV_VERSION: "3.2.334"
        run: pip install --no-cache-dir "checkov==${CHECKOV_VERSION}"

      - name: Render Kustomize overlays
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .rendered
          for overlay in apps/*/overlays/*/; do
            name="$(echo "${overlay}" | tr '/' '_' | sed 's/_$//')"
            echo "Rendering ${overlay} -> .rendered/${name}.yaml"
            kustomize build "${overlay}" > ".rendered/${name}.yaml"
          done

      - name: Run Checkov (rendered overlays)
        shell: bash
        run: |
          set -euo pipefail
          checkov \
            --directory .rendered \
            --config-file .checkov.yaml \
            --output cli \
            --output sarif \
            --output-file-path console,results_sarif_rendered.sarif

      - name: Run Checkov (non-kustomize paths)
        shell: bash
        run: |
          set -euo pipefail
          checkov \
            --directory . \
            --config-file .checkov.yaml \
            --output cli \
            --output sarif \
            --output-file-path console,results_sarif_raw.sarif

      - name: Upload SARIF (rendered overlays) to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: results_sarif_rendered.sarif
          category: checkov-rendered

      - name: Upload SARIF (non-kustomize) to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: results_sarif_raw.sarif
          category: checkov-raw

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    needs: [lint-check, security-scan]
    if: always()
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ vars.SLACK_CHANNEL_CI }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
