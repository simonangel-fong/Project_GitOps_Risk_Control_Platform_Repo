apiVersion: v1
kind: ConfigMap
metadata:
  name: argo-rollouts-notification-configmap
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/name: argo-rollouts-notification-configmap
    app.kubernetes.io/part-of: argo-rollouts
data:
  service.slack: |
    token: ${{ "{" }}{{ .Values.slack.secretKey }}{{ "}" }}

  template.rollout-completed: |
    message: |
      :rocket: Rollout *{{ "{{" }}.rollout.metadata.name{{ "}}" }}* in `{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}` fully promoted.
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .rollout.metadata.name {{ "}}" }}",
          "color": "#18be52",
          "fields": [
            { "title": "Namespace", "value": "{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}",                                  "short": true },
            { "title": "Strategy",  "value": "{{ "{{" }}if .rollout.spec.strategy.canary{{ "}}" }}canary{{ "{{" }}else{{ "}}" }}blueGreen{{ "{{" }}end{{ "}}" }}", "short": true },
            { "title": "Image",     "value": "{{ "{{" }}(index .rollout.spec.template.spec.containers 0).image{{ "}}" }}",       "short": false }
          ]
        }]

  template.rollout-degraded: |
    message: |
      :rotating_light: Rollout *{{ "{{" }}.rollout.metadata.name{{ "}}" }}* in `{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}` is degraded.
      Investigate: `kubectl argo rollouts get rollout {{ "{{" }}.rollout.metadata.name{{ "}}" }} -n {{ "{{" }}.rollout.metadata.namespace{{ "}}" }}`
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .rollout.metadata.name {{ "}}" }}",
          "color": "#E96D76",
          "fields": [
            { "title": "Namespace", "value": "{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}", "short": true },
            { "title": "Phase",     "value": "{{ "{{" }}.rollout.status.phase{{ "}}" }}",      "short": true },
            { "title": "Message",   "value": "{{ "{{" }}.rollout.status.message{{ "}}" }}",    "short": false }
          ]
        }]

  template.rollout-paused: |
    message: |
      :pause_button: Rollout *{{ "{{" }}.rollout.metadata.name{{ "}}" }}* in `{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}` is paused at a manual gate.
      Promote with: `kubectl argo rollouts promote {{ "{{" }}.rollout.metadata.name{{ "}}" }} -n {{ "{{" }}.rollout.metadata.namespace{{ "}}" }}`
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .rollout.metadata.name {{ "}}" }}",
          "color": "#f4c430",
          "fields": [
            { "title": "Namespace",   "value": "{{ "{{" }}.rollout.metadata.namespace{{ "}}" }}",       "short": true },
            { "title": "Current Step", "value": "{{ "{{" }}.rollout.status.currentStepIndex{{ "}}" }}", "short": true }
          ]
        }]

  template.analysis-run-failed: |
    message: |
      :x: AnalysisRun *{{ "{{" }}.analysisRun.metadata.name{{ "}}" }}* failed in `{{ "{{" }}.analysisRun.metadata.namespace{{ "}}" }}`.
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .analysisRun.metadata.name {{ "}}" }}",
          "color": "#E96D76",
          "fields": [
            { "title": "Namespace", "value": "{{ "{{" }}.analysisRun.metadata.namespace{{ "}}" }}", "short": true },
            { "title": "Phase",    "value": "{{ "{{" }}.analysisRun.status.phase{{ "}}" }}",       "short": true },
            { "title": "Message",  "value": "{{ "{{" }}.analysisRun.status.message{{ "}}" }}",     "short": false }
          ]
        }]

  template.analysis-run-error: |
    message: |
      :warning: AnalysisRun *{{ "{{" }}.analysisRun.metadata.name{{ "}}" }}* hit an infrastructure / query error in `{{ "{{" }}.analysisRun.metadata.namespace{{ "}}" }}`.
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .analysisRun.metadata.name {{ "}}" }}",
          "color": "#f4c430",
          "fields": [
            { "title": "Namespace", "value": "{{ "{{" }}.analysisRun.metadata.namespace{{ "}}" }}", "short": true },
            { "title": "Message",   "value": "{{ "{{" }}.analysisRun.status.message{{ "}}" }}",    "short": false }
          ]
        }]

  trigger.on-rollout-completed: |
    - description: Rollout fully promoted
      when: rollout.status.phase == 'Healthy'
      send: [rollout-completed]

  trigger.on-rollout-degraded: |
    - description: Rollout degraded or aborted
      when: rollout.status.phase == 'Degraded'
      send: [rollout-degraded]

  trigger.on-rollout-paused: |
    - description: Rollout paused at manual gate
      when: rollout.status.phase == 'Paused'
      send: [rollout-paused]

  trigger.on-analysis-run-failed: |
    - description: AnalysisRun failed
      when: analysisRun.status.phase == 'Failed'
      send: [analysis-run-failed]

  trigger.on-analysis-run-error: |
    - description: AnalysisRun errored (infra / query problem)
      when: analysisRun.status.phase == 'Error'
      send: [analysis-run-error]
