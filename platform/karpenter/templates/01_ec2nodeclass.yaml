apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: general-node-class
  annotations:
    argocd.argoproj.io/sync-wave: "122"
spec:
  role: {{ .Values.clusterName | quote }}
  amiSelectorTerms:
    - alias: bottlerocket@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  tags:
    Name: karpenter/{{ .Values.clusterName }}/general
    managed-by: karpenter
