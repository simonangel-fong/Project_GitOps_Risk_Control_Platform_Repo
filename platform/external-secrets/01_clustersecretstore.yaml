# clustersecretstore.yaml
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  provider:
    aws:
      service: ParameterStore
      region: ca-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
