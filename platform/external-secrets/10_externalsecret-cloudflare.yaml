# # platform/external-secrets/10_externalsecret-cloudflare.yaml
# # Materialises the `cloudflare-api-key` Secret consumed by external-dns
# # from an SSM parameter at /gitops/cloudflare/api-token.
# #
# # Create the source parameter once (outside git) with:
# #   aws ssm put-parameter \
# #     --name /gitops/cloudflare/api-token \
# #     --type SecureString \
# #     --value <token> \
# #     --region ca-central-1
# apiVersion: external-secrets.io/v1
# kind: ExternalSecret
# metadata:
#   name: cloudflare-api-key
#   namespace: external-dns
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-ssm
#     kind: ClusterSecretStore
#   target:
#     name: cloudflare-api-key
#     creationPolicy: Owner
#   data:
#     # - secretKey: cloudflare_api_key
#     #   remoteRef:
#     #     key: /gitops/cloudflare/cloudflare-api-key
