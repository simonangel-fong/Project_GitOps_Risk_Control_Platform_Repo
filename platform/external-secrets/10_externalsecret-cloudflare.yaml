# platform/external-secrets/10_externalsecret-cloudflare.yaml
# Materialises the `cloudflare-api-key` Secret consumed by external-dns
# from the SSM parameter at /gitops/cloudflare/cloudflare-api-key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-key
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-key
    creationPolicy: Owner
  data:
    - secretKey: cloudflare_api_key
      remoteRef:
        key: /gitops/cloudflare/cloudflare-api-key
