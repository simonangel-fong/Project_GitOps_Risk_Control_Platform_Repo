apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-down
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: app-availability
      rules:
        - alert: AppPodOOMKilled
          expr: |
            sum by (namespace, pod) (
              kube_pod_container_status_last_terminated_reason{
                namespace=~"{{ join "|" .Values.namespaces }}",
                reason="OOMKilled"
              }
            ) > 0
          for: 30s
          labels:
            severity: {{ .Values.alert.severity }}
          annotations:
            summary: "Pod {{`{{ $labels.pod }}`}} in {{`{{ $labels.namespace }}`}} was OOMKilled"
            description: "A container in pod {{`{{ $labels.pod }}`}} (namespace {{`{{ $labels.namespace }}`}}) was last terminated by OOMKill. The application may be hitting its memory limit."

        - alert: AppNamespaceDegraded
          expr: |
            (
              sum by (namespace) (kube_pod_status_ready{namespace=~"{{ join "|" .Values.namespaces }}",condition="true"})
              /
              sum by (namespace) (kube_pod_status_phase{namespace=~"{{ join "|" .Values.namespaces }}",phase!="Succeeded"})
            ) < 0.5
          for: {{ .Values.alert.for }}
          labels:
            severity: {{ .Values.alert.severity }}
          annotations:
            summary: "Less than 50% of pods ready in namespace {{`{{ $labels.namespace }}`}}"
            description: "Namespace {{`{{ $labels.namespace }}`}} has fewer than half its pods in Ready state for more than {{ .Values.alert.for }}. The application is degraded."
