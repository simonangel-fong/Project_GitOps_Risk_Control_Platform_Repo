apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-down
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: app-availability
      rules:
        - alert: AppNamespaceDown
          expr: |
            sum by (namespace) (
              kube_pod_status_ready{namespace=~"{{ join "|" .Values.namespaces }}",condition="true"}
            ) == 0
          for: {{ .Values.alert.for }}
          labels:
            severity: {{ .Values.alert.severity }}
          annotations:
            summary: "No ready pods in namespace {{`{{ $labels.namespace }}`}}"
            description: "Namespace {{`{{ $labels.namespace }}`}} has zero ready pods for more than {{ .Values.alert.for }}. The application is effectively down."

        - alert: AppPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"{{ join "|" .Values.namespaces }}"}[5m]) > 3
          for: {{ .Values.alert.for }}
          labels:
            severity: {{ .Values.alert.severity }}
          annotations:
            summary: "Pod {{`{{ $labels.pod }}`}} in {{`{{ $labels.namespace }}`}} is crash looping"
            description: "Container in pod {{`{{ $labels.pod }}`}} restarted more than 3 times in the last 5 minutes."
