apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-app-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  app-health.json: |
    {
      "title": "App Health — Backend & Frontend",
      "uid": "app-health-backend-frontend",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "",
      "refresh": "30s",
      "time": { "from": "now-30m", "to": "now" },
      "tags": ["gitops", "app-health"],
      "templating": { "list": [] },
      "panels": [
        {
          "type": "row",
          "title": "Backend",
          "id": 100,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Running pods",
          "id": 101,
          "gridPos": { "x": 0, "y": 1, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_status_phase{namespace=\"backend\",phase=\"Running\"})",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "title": "Pending pods",
          "id": 102,
          "gridPos": { "x": 8, "y": 1, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_status_phase{namespace=\"backend\",phase=\"Pending\"})",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "title": "OOMKilled pods",
          "id": 103,
          "gridPos": { "x": 16, "y": 1, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "red", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_container_status_last_terminated_reason{namespace=\"backend\",reason=\"OOMKilled\"})",
            "refId": "A"
          }]
        },
        {
          "type": "timeseries",
          "title": "Pod restarts over time",
          "id": 104,
          "gridPos": { "x": 0, "y": 7, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] } },
          "targets": [{
            "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"backend\"})",
            "legendFormat": "{{`{{pod}}`}}",
            "refId": "A"
          }]
        },

        {
          "type": "row",
          "title": "Frontend",
          "id": 200,
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Running pods",
          "id": 201,
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "red", "value": null },
                { "color": "green", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_status_phase{namespace=\"frontend\",phase=\"Running\"})",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "title": "Pending pods",
          "id": 202,
          "gridPos": { "x": 8, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_status_phase{namespace=\"frontend\",phase=\"Pending\"})",
            "refId": "A"
          }]
        },
        {
          "type": "stat",
          "title": "OOMKilled pods",
          "id": 203,
          "gridPos": { "x": 16, "y": 16, "w": 8, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area", "textMode": "value" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "red", "value": 1 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "expr": "sum(kube_pod_container_status_last_terminated_reason{namespace=\"frontend\",reason=\"OOMKilled\"})",
            "refId": "A"
          }]
        },
        {
          "type": "timeseries",
          "title": "Pod restarts over time",
          "id": 204,
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] } },
          "targets": [{
            "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"frontend\"})",
            "legendFormat": "{{`{{pod}}`}}",
            "refId": "A"
          }]
        }
      ]
    }
