apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-app-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  app-health.json: |
    {
      "title": "App Health — Backend & Frontend",
      "uid": "app-health-backend-frontend",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["gitops", "app-health"],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "query": "{{ join "," .Values.namespaces }}",
            "current": { "text": "All", "value": "$__all" },
            "options": [],
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Pods by phase",
          "id": 1,
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*phase=\"(Failed|Pending|Unknown)\".*" },
                "properties": [
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "red", "value": 1 }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "sum by (namespace, phase) (kube_pod_status_phase{namespace=~\"$namespace\"})",
              "legendFormat": "{{`{{namespace}}`}} / {{`{{phase}}`}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Available replicas vs desired",
          "id": 2,
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "sum by (namespace, deployment) (kube_deployment_status_replicas_available{namespace=~\"$namespace\"})",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{deployment}}`}} available",
              "refId": "A"
            },
            {
              "expr": "sum by (namespace, deployment) (kube_deployment_spec_replicas{namespace=~\"$namespace\"})",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{deployment}}`}} desired",
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Container restarts (last 15m)",
          "id": 3,
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 60 },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[15m]))",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
