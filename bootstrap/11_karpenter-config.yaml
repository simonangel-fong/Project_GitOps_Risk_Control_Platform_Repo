# bootstrap/karpenter-config.yaml
# EC2NodeClass + NodePool CRs. Syncs after the Karpenter controller is up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 11-karpenter-config
  namespace: argocd
  finalizers: {}
    # - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
    targetRevision: main
    path: platform/karpenter
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
