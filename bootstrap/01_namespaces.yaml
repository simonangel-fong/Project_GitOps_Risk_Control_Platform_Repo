# bootstrap/01_namespaces.yaml
# Wave 1 — pre-creates namespaces that later waves need to exist before
# they create resources inside them (e.g. ExternalSecrets at wave 6
# targeting a workload namespace whose chart is installed at a later wave).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-01-namespaces
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
    targetRevision: main
    path: platform/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
