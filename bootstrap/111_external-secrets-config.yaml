# bootstrap/111_external-secrets-config.yaml
# Wave 111 — applies the ClusterSecretStore and ExternalSecret CRs.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  # goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters: {}
  template:
    metadata:
      name: platform-111-external-secrets-config
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: "111"
    spec:
      project: default
      source:
        repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
        targetRevision: '{{ index .metadata.annotations "env" }}'
        path: platform/external-secrets
        helm:
          releaseName: external-secrets-config
          values: |
            aws:
              region: ca-central-1
              serviceAccount:
                name: external-secrets
                namespace: external-secrets

            cloudflare:
              ssmKey: '{{ index .metadata.annotations "eso.cloudflare" }}'
              namespace: external-dns
              refreshInterval: 1h
              secretName: cloudflare-api-key
              secretKey: cloudflare_api_key
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          # selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            maxDuration: 3m
            factor: 2
        syncOptions:
          - ServerSideApply=true
          # - ApplyOutOfSyncOnly=true
