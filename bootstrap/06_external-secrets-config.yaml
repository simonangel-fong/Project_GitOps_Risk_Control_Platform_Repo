# bootstrap/06_external-secrets-config.yaml
# Wave 6 — applies the ClusterSecretStore and ExternalSecret CRs.
# Syncs immediately after the ESO controller (and its CRDs) come up at wave 5.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-06-external-secrets-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
    targetRevision: main
    path: platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
