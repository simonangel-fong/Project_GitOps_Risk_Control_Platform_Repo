# bootstrap/600_kube-prometheus-stack.yaml
# Wave 600 — installs kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
# via the prometheus-community Helm chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-600-kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    type: platform
  annotations:
    argocd.argoproj.io/sync-wave: "600"
spec:
  project: gitops
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.6.1
    helm:
      releaseName: kube-prometheus-stack
      values: |
        fullnameOverride: kps

        crds:
          enabled: true

        prometheus:
          prometheusSpec:
            replicas: 1
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            # storageSpec:
            #   volumeClaimTemplate:
            #     spec:
            #       accessModes: ["ReadWriteOnce"]
            #       resources:
            #         requests:
            #           storage: 20Gi

        alertmanager:
          alertmanagerSpec:
            replicas: 1
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            # Mount the ESO-managed secret so the webhook URL is available as a file
            # at /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
            secrets:
              - alertmanager-slack-webhook

          config:
            global:
              resolve_timeout: 5m

            route:
              receiver: "null"
              group_by: ["alertname", "namespace"]
              group_wait: 10s
              group_interval: 1m
              repeat_interval: 30m
              routes:
                # Send our app-availability alerts to Slack
                - matchers:
                    - severity = "critical"
                  receiver: slack-platform-alerts
                  continue: false

            receivers:
              - name: "null"
              - name: slack-platform-alerts
                slack_configs:
                  - channel: "#platform-alerts"
                    api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
                    send_resolved: true
                    title: '{{ template "slack.title" . }}'
                    text: '{{ template "slack.text" . }}'

            templates:
              - /etc/alertmanager/config/*.tmpl

            inhibit_rules:
              - source_matchers:
                  - alertname = "Watchdog"
                target_matchers:
                  - alertname =~ ".+"
                equal: ["namespace"]

          templateFiles:
            slack.tmpl: |-
              {{ define "slack.title" -}}
              {{ if eq .Status "firing" }}:rotating_light:{{ else }}:white_check_mark:{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
              {{- end }}

              {{ define "slack.text" -}}
              {{ range .Alerts -}}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Namespace:* `{{ .Labels.namespace }}`{{ if .Labels.pod }} *Pod:* `{{ .Labels.pod }}`{{ end }}
              *Severity:* `{{ .Labels.severity }}`
              {{ end }}
              {{- end }}

        grafana:
          enabled: true
          replicas: 1
          adminPassword: prom-operator
          defaultDashboardsEnabled: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          service:
            type: ClusterIP
          persistence:
            enabled: false

        kube-state-metrics:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        nodeExporter:
          enabled: false
        prometheus-node-exporter:
          enabled: false

        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      # selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
