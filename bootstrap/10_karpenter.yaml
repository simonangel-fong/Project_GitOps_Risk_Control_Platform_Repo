# bootstrap/karpenter.yaml
# Installs the Karpenter controller via Helm (OCI chart).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 10-karpenter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.12.1
    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: gitops-demo-dev
          clusterEndpoint: https://B4419B2BF5D4DA5D0D1D0526EC5DD3BA.gr7.ca-central-1.eks.amazonaws.com
          interruptionQueue: Karpenter-gitops-demo-dev
        # serviceAccount:
        #   annotations:
        #     eks.amazonaws.com/role-arn: <arn>
        controller:
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
