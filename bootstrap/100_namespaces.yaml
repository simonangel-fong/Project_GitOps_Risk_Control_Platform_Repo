# bootstrap/100_namespaces.yaml
# Wave 100 — pre-creates namespaces that later waves need to exist before

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespaces
  namespace: argocd
  annotations: {}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  # goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters: {} # Automatically use all clusters defined within Argo CD
  template:
    metadata:
      name: platform-100-namespaces
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        type: platform
      annotations:
        argocd.argoproj.io/sync-wave: "100"
    spec:
      project: '{{ index .metadata.annotations "project" }}'
      source:
        repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
        targetRevision: '{{ index .metadata.annotations "env" }}'
        path: platform/namespaces
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            maxDuration: 3m
            factor: 2
        syncOptions:
          - ServerSideApply=true
