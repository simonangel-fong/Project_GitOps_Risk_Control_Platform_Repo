# bootstrap/20_albc.yaml
# Wave 20 — installs the AWS Load Balancer Controller via Helm (eks-charts).
# Auth uses IRSA: the role is provisioned in the infra repo and its ARN
# is annotated on the aws-load-balancer-controller ServiceAccount below.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-20-albc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: 3.3.0
    helm:
      releaseName: albc
      values: |
        clusterName: gitops-demo-dev
        region: ca-central-1
        vpcId: vpc-019737d8f56bb7523

        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::099139718958:role/gitops-demo-dev-albc
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
