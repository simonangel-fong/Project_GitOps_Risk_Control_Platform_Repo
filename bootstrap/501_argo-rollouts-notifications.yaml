# bootstrap/501_argo-rollouts-notifications.yaml
# Wave 501 — applies the argo-rollouts-notification-configmap consumed by the
# Argo Rollouts notifications engine. Depends on:
#   - wave 111 (ExternalSecret creating argo-rollouts-notification-secret)
#   - wave 500 (Argo Rollouts controller install)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts-notifications
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  # goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters: {}
  template:
    metadata:
      name: platform-501-argo-rollouts-notifications
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        type: platform
      annotations:
        argocd.argoproj.io/sync-wave: "501"
    spec:
      project: gitops
      source:
        repoURL: https://github.com/simonangel-fong/Project_GitOps_Platform_Repo.git
        targetRevision: '{{ index .metadata.annotations "env" }}'
        path: platform/argo-rollouts-notifications
        helm:
          releaseName: argo-rollouts-notifications
          values: |
            slack:
              secretName: argo-rollouts-notification-secret
              secretKey: slack-token
      destination:
        server: https://kubernetes.default.svc
        namespace: argo-rollouts
      syncPolicy:
        automated:
          prune: true
          # selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            maxDuration: 3m
            factor: 2
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=false
