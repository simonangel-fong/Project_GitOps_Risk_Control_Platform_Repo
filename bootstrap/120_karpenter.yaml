# bootstrap/10_karpenter.yaml
# Wave 10 — installs the Karpenter controller via Helm (OCI chart).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: karpenter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  # goTemplateOptions: ["missingkey=error"]
  generators:
  - clusters: {}
  template:
    metadata:
      name: platform-120-karpenter
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        type: platform
      annotations:
        argocd.argoproj.io/sync-wave: "120"
    spec:
      project: gitops
      source:
        repoURL: public.ecr.aws/karpenter
        chart: karpenter
        targetRevision: 1.12.1
        helm:
          releaseName: karpenter
          values: |
            settings:
              clusterName: '{{ index .metadata.annotations "eks.cluster-name" }}'
              clusterEndpoint: '{{ index .metadata.annotations "eks.cluster-endpoint" }}'
              interruptionQueue: '{{ index .metadata.annotations "eks.interruption-queue" }}'

            controller:
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
      destination:
        server: https://kubernetes.default.svc
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          # selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            maxDuration: 3m
            factor: 2
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=false